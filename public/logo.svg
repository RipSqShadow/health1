<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">

  <defs>

    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">

      <stop offset="0%" style="stop-color:#2dd4bf"/>

      <stop offset="40%" style="stop-color:#14b8a6"/>

      <stop offset="100%" style="stop-color:#059669"/>

    </linearGradient>

    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">

      <stop offset="0%" style="stop-color:#fb7185"/>

      <stop offset="100%" style="stop-color:#f43f5e"/>

    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">

      <feGaussianBlur stdDeviation="3" result="blur"/>

      <feMerge>

        <feMergeNode in="blur"/>

        <feMergeNode in="SourceGraphic"/>

      </feMerge>

    </filter>

    <radialGradient id="shine" cx="35%" cy="30%" r="50%">

      <stop offset="0%" style="stop-color:white;stop-opacity:0.35"/>

      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>

    </radialGradient>

  </defs>

  <circle cx="60" cy="60" r="56" fill="url(#logoGrad)" opacity="0.12"/>

  <circle cx="60" cy="60" r="48" fill="url(#logoGrad)" filter="url(#glow)"/>

  <circle cx="60" cy="60" r="48" fill="url(#shine)"/>

  <path d="M60 35 C45 35 38 48 38 55 C38 68 60 82 60 82 C60 82 82 68 82 55 C82 48 75 35 60 35Z" fill="url(#heartGrad)"/>

  <circle cx="60" cy="52" r="7" fill="white" opacity="0.95"/>

  <path d="M48 88 Q60 95 72 88" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>

</svg>

